  - ref: "GR 50"
    name: "Tour du Parc National des Ecrins (Hautes-Alpes, Isère)"
    description: "Le Tour des Écrins est une boucle épique de 370 km au cœur du massif le plus sauvage d’Europe. En passant par les Hautes-Alpes et l'Isère, ce sentier en balcon offre un panorama glaciaire spectaculaire (Meije, Barre des Écrins). Vous y découvrirez un patrimoine alpin unique – hameaux de pierre séculaires – tout en traversant forêts de mélèzes et pelouses alpines. C'est le terrain de jeu privilégié pour observer la faune emblématique : chamois, bouquetin et aigle royal."
